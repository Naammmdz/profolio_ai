# Preserve X-Forwarded-Proto from upstream HTTPS proxy (e.g. Cloudflare, Caddy)
# If no upstream proxy sets it, fall back to the current scheme
map $http_x_forwarded_proto $x_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# Extract port from browser's Host header (e.g. localhost:4000 → 4000)
# $server_port is the container's internal port (80), NOT the host-mapped port
map $http_host $forwarded_port {
    "~^[^:]+:(?<p>\d+)$" $p;
    default              $server_port;
}

server {
    listen 80;
    server_name localhost;

    # Use Docker's internal DNS resolver (re-resolve on container restarts)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Handle large JWT tokens in Authorization headers
    large_client_header_buffers 4 32k;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Gateway (AGW)
    location /api/ {
        proxy_pass http://agw:8080/api/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $forwarded_port;
        proxy_buffer_size 32k;
        proxy_buffers 4 32k;
    }

    # Proxy OAuth2 / Login / Register requests DIRECTLY to auth-server
    # Only proxy OIDC-specific .well-known paths (not Chrome DevTools or other .well-known)
    location ~ ^/(oauth2/|connect/|login|register|\.well-known/openid-configuration|\.well-known/oauth-authorization-server|\.well-known/jwks\.json|userinfo) {
        proxy_pass http://auth-server:9000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $forwarded_port;

        # Rewrite any redirect Location headers from auth-server internal URL to public URL
        proxy_redirect http://auth-server:9000/ /;
    }
}
