server:
  port: ${SERVER_PORT:8081}
  max-http-request-header-size: 32KB
  forward-headers-strategy: framework

spring:
  application:
    name: PortfolioService
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/portfoliodb}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  
  cloud:
    consul:
      host: ${CONSUL_HOST:localhost}
      port: ${CONSUL_PORT:8500}
      discovery:
        enabled: true
        service-name: ${spring.application.name}
        instance-id: ${spring.application.name}:${random.value}
        prefer-ip-address: true

  ai:
    google:
      genai:
        api-key: ${GOOGLE_AI_API_KEY:your_gemini_api_key_here}
        project-id: ${GOOGLE_AI_PROJECT_ID:dummy-project-id}
        location: ${GOOGLE_AI_LOCATION:us-central1}
        chat:
          options:
            model: gemini-3.1-flash-lite-preview

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9002}
  publicUrl: ${MINIO_PUBLIC_URL:http://localhost:9002}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  bucketName: ${MINIO_BUCKET_NAME:profolio-files}

logging:
  level:
    root: INFO
    # Internal packages - full DEBUG
    com.naammm.portfolioservice: DEBUG
    # Hibernate SQL bind parameters (show actual values, not just ?)
    org.hibernate.orm.jdbc.bind: TRACE
    org.hibernate.SQL: DEBUG
    # Spring Security - trace auth flow
    org.springframework.security: DEBUG
    # Spring Web - log request mapping & exceptions
    org.springframework.web: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    # Spring AI - log model calls
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/portfolio-service.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
