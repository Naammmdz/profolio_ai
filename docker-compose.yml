services:
  consul:
    image: hashicorp/consul:1.15
    container_name: consul
    ports:
      - "8500:8500"
    command: "agent -dev -client=0.0.0.0"
    healthcheck:
      test: ["CMD", "consul", "info"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profolio-network

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - profolio-network

  minio:
    image: minio/minio:latest
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - profolio-network

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/profolio-files || true;
      mc anonymous set public myminio/profolio-files;
      exit 0;
      "
    networks:
      - profolio-network

  auth-server:
    build:
      context: ./profolio-be/AuthorizationServer
    container_name: auth-server
    environment:
      SERVER_PORT: 9000
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/authdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      ISSUER_URL: ${PUBLIC_URL:-http://localhost:4000}
      FRONTEND_BASE_URL: ${PUBLIC_URL:-http://localhost:4000}
      ALLOWED_ORIGINS: ${PUBLIC_URL:-http://localhost:4000},http://localhost:3000,http://localhost:5173
      SPA_REDIRECT_URIS: ${PUBLIC_URL:-http://localhost:4000}/callback,http://localhost:3000/callback
      SPA_POST_LOGOUT_REDIRECT_URIS: ${PUBLIC_URL:-http://localhost:4000}/,http://localhost:3000/
    # ports:
    #   - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9000/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - profolio-network

  portfolio-service:
    build:
      context: ./profolio-be/PortfolioService
    container_name: portfolio-service
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/portfoliodb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${PUBLIC_URL:-http://localhost:4000}
      # Tell service to reach auth-server internally for jwks validation
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-server:9000/oauth2/jwks
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-dummy_key_to_prevent_crash_12345}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9002}
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    # ports:
    #   - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      consul:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - profolio-network

  agw:
    build:
      context: ./profolio-be/AGW
    container_name: agw
    environment:
      SERVER_PORT: 8080
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${PUBLIC_URL:-http://localhost:4000}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://auth-server:9000/oauth2/jwks
    # ports:
    #   - "8080:8080"
    depends_on:
      auth-server:
        condition: service_healthy
      portfolio-service:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - profolio-network

  profolio-fe:
    build:
      context: ./profolio-fe
    container_name: profolio-fe
    ports:
      - "4000:80"
    depends_on:
      agw:
        condition: service_healthy
    networks:
      - profolio-network

networks:
  profolio-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
